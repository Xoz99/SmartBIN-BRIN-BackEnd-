version: "3.9"

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: smartbin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: smartbin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: smartbin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartbin -d smartbin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: smartbin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Mosquitto MQTT ─────────────────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: smartbin-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t test -m test && echo ok"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Python Classify Service ─────────────────────────────────────────────────
  classify:
    build:
      context: ./classify
      dockerfile: Dockerfile
    container_name: smartbin-classify
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./classify/model:/app/model  # Mount your best.pt here
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─── Node.js Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartbin-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://smartbin:password@postgres:5432/smartbin_db?schema=public
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      CLASSIFY_SERVICE_URL: http://classify:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
      classify:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:
